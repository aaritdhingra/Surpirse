<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 4 Months My Love 💖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  padding: 15px;
  position: relative;
  background: linear-gradient(135deg, #ffd1dc, #ffe6f0, #fff5f8);
}

/* Background Heart with "I said I love you first" */
.bg-heart {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
  opacity: 0.08;
  pointer-events: none;
  text-align: center;
}

.bg-heart-emoji {
  font-size: 320px;
  color: #ff4f8b;
  filter: blur(2px);
}

.bg-heart-text {
  font-family: 'Great Vibes', cursive;
  font-size: 55px;
  color: #ff4f8b;
  margin-top: -40px;
  text-shadow: 0 2px 10px rgba(255, 79, 139, 0.3);
}

/* Card Container */
.card {
  width: 100%;
  max-width: 420px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(15px);
  border-radius: 30px;
  box-shadow: 0 20px 50px rgba(255, 105, 180, 0.25);
  padding: 30px 25px;
  text-align: center;
  position: relative;
  z-index: 10;
}

.title-script {
  font-family: 'Great Vibes', cursive;
  font-size: 2.8rem;
  color: #ff4f8b;
  margin-bottom: 15px;
}

h2 {
  color: #ff4f8b;
  margin-bottom: 12px;
  font-size: 1.5rem;
}

p {
  line-height: 1.8;
  color: #555;
  font-size: 15px;
}

button {
  border: none;
  background: linear-gradient(45deg, #ff4f8b, #ff77a9);
  color: #fff;
  padding: 14px 35px;
  border-radius: 50px;
  margin-top: 20px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(255, 79, 139, 0.35);
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 30px rgba(255, 79, 139, 0.45);
}

button:active {
  transform: scale(0.98);
}

/* Flip Card */
.flip-card {
  perspective: 1200px;
  margin: 20px 0;
}

.flip-inner {
  position: relative;
  width: 100%;
  height: 450px;
  transform-style: preserve-3d;
  transition: transform 0.8s ease;
}

.flip-inner.flipped {
  transform: rotateY(180deg);
}

.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
}

.front {
  background: #fff;
  display: flex;
  flex-direction: column;
}

.photo-container {
  width: 100%;
  height: 380px;
  background: linear-gradient(135deg, #ffd1dc, #ffb3c6);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.photo-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

.photo-placeholder {
  font-size: 80px;
  color: rgba(255, 79, 139, 0.3);
}

.caption {
  padding: 15px;
  background: rgba(255, 79, 139, 0.95);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  text-align: center;
}

.back {
  transform: rotateY(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 35px 25px;
  background: linear-gradient(135deg, #fff, #ffeaf3);
  color: #ff4f8b;
  font-weight: 600;
  line-height: 1.9;
  font-size: 16px;
  text-align: center;
}

/* Fall Animation */
.fall {
  animation: fall 1s ease-in forwards;
}

@keyframes fall {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(120vh) rotate(25deg);
    opacity: 0;
  }
}

/* Envelope Animation */
.envelope-container {
  position: relative;
  width: 100%;
  max-width: 350px;
  margin: 30px auto;
}

.envelope {
  position: relative;
  width: 100%;
  height: 200px;
  background: #ff4f8b;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.5s ease;
}

.envelope::before {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 0;
  border-left: 175px solid transparent;
  border-right: 175px solid transparent;
  border-top: 100px solid #ff77a9;
  transform-origin: top;
  transition: all 0.5s ease;
}

.envelope.open::before {
  transform: rotateX(180deg);
  border-top-color: #ff4f8b;
}

.envelope-letter {
  position: absolute;
  top: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(0);
  width: 90%;
  background: white;
  border-radius: 10px;
  padding: 25px 20px;
  box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
  transition: all 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  max-height: 0;
  overflow: hidden;
  opacity: 0;
}

.envelope.open .envelope-letter {
  transform: translateX(-50%) translateY(-180px);
  max-height: 600px;
  opacity: 1;
}

.envelope-text {
  font-size: 13px;
  line-height: 1.7;
  color: #555;
  text-align: left;
  max-height: 450px;
  overflow-y: auto;
  padding-right: 8px;
}

.envelope-text::-webkit-scrollbar {
  width: 5px;
}

.envelope-text::-webkit-scrollbar-thumb {
  background: #ff4f8b;
  border-radius: 10px;
}

.envelope-title {
  font-family: 'Great Vibes', cursive;
  font-size: 2rem;
  color: #ff4f8b;
  text-align: center;
  margin-bottom: 15px;
}

.envelope-prompt {
  text-align: center;
  margin-top: 15px;
  color: #fff;
  font-size: 14px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* Letter styling */
.letter {
  text-align: left;
}

.letter h1 {
  font-family: 'Great Vibes', cursive;
  text-align: center;
  font-size: 2.5rem;
  color: #ff4f8b;
  margin-bottom: 20px;
}

.letter p {
  font-size: 15px;
  line-height: 1.9;
  margin-bottom: 15px;
}

.center {
  text-align: center;
}

/* Floating Hearts */
.heart {
  position: fixed;
  bottom: -50px;
  pointer-events: none;
  z-index: 9999;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  0% {
    bottom: -50px;
    opacity: 0;
    transform: translateX(0) rotate(0deg);
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    bottom: 110vh;
    opacity: 0;
    transform: translateX(var(--drift)) rotate(360deg);
  }
}

/* Responsive */
@media (max-width: 480px) {
  .title-script {
    font-size: 2.2rem;
  }
  
  h2 {
    font-size: 1.3rem;
  }
  
  .flip-inner {
    height: 400px;
  }
  
  .photo-container {
    height: 330px;
  }
  
  .bg-heart-emoji {
    font-size: 200px;
  }
  
  .bg-heart-text {
    font-size: 32px;
  }
  
  button {
    padding: 12px 30px;
    font-size: 16px;
  }
  
  .envelope::before {
    border-left: 160px solid transparent;
    border-right: 160px solid transparent;
  }
  
  .envelope-title {
    font-size: 1.7rem;
  }
  
  .envelope-text {
    font-size: 13px;
  }
}

@media (max-width: 360px) {
  .flip-inner {
    height: 360px;
  }
  
  .photo-container {
    height: 290px;
  }
  
  .envelope::before {
    border-left: 140px solid transparent;
    border-right: 140px solid transparent;
  }
}
</style>
</head>
<body>

<!-- Background Heart -->
<div class="bg-heart">
  <div class="bg-heart-emoji">❤️</div>
  <div class="bg-heart-text">I said I love you first</div>
</div>

<!-- Main Card -->
<div class="card" id="app">
  <div class="title-script">Hey Love ❤️</div>
  <h2>🔔 New Notification</h2>
  <p>You have a new notification from <strong>Aarit Dhingra</strong></p>
  <button onclick="startStory()">Read 💌</button>
</div>

<script>
const slides = [
  {
    image: 'photo1.jpg',
    caption: 'Our first photo together ❤️',
    message: 'Well technically it is our first pic together, but definitely it was when i was able to start opening up to you". This moment was pure magic and relief✨'
  },
  {
    image: 'photo2.jpg',
    caption: 'Caught by our friends 📸',
    message: 'Yaad hai Kaushi ka birthday aur yeh photo wali demand uski ? We were so shy, pretending we didn\'t wanted to... but secretly loving every second 🙈💕'
  },
  {
    image: 'photo3.jpg',
    caption: 'Pinterest-perfect us 🌸',
    message: 'This screams aesthetic goals! But honestly, being with you makes every moment picture-perfect, no filter needed 📷💖'
  },
  {
    image: 'photo4.jpg',
    caption: 'Just us being adorable 😘',
    message: 'Both our faces, both our smiles, all our happiness in one frame. This is what forever looks like 🥰💫'
  }
];

let current = 0;
let flipped = false;

function startStory() {
  renderSlide();
}

function renderSlide() {
  const s = slides[current];
  const app = document.getElementById('app');
  app.className = 'card';
  
  app.innerHTML = `
    <div class="flip-card">
      <div class="flip-inner" id="flipInner">
        <div class="face front">
          <div class="photo-container">
            <img src="${s.image}" alt="Memory" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="photo-placeholder" style="display:none;">📸</div>
          </div>
          <div class="caption">${s.caption}</div>
        </div>
        <div class="face back">
          ${s.message}
        </div>
      </div>
    </div>
    <button onclick="handleNext()" id="nextBtn">See Message ✨</button>
  `;
  
  flipped = false;
}

function handleNext() {
  const flip = document.getElementById('flipInner');
  const btn = document.getElementById('nextBtn');
  
  if (!flipped) {
    flip.classList.add('flipped');
    flipped = true;
    btn.innerHTML = 'Next Photo 💫';
    return;
  }
  
  const app = document.getElementById('app');
  app.classList.add('fall');
  
  setTimeout(() => {
    current++;
    if (current < slides.length) {
      renderSlide();
    } else {
      showLetter();
    }
  }, 1000);
}

function showLetter() {
  const app = document.getElementById('app');
  app.className = 'card';
  
  app.innerHTML = `
    <h2 style="margin-bottom: 25px;">You've got mail! 💌</h2>
    <div class="envelope-container">
      <div class="envelope" id="envelope" onclick="openEnvelope()">
        <div class="envelope-letter">
          <div class="envelope-text">
            <div class="envelope-title">To My Love 💖</div>
            <p style="text-align: center; margin-bottom: 20px;">
              <strong>Happy 4 Months, My Beautiful Girl! 🎉</strong>
            </p>
            
            <p>So here we are... <strong>4 months</strong> of us! Can you believe it? 💕</p>
            
            <p>This month tested us, I won't lie. We fought more than before, problems knocked on our door... but you know what? We didn't just survive - we came out <strong>stronger and closer</strong> than ever! 💪❤️</p>
            
            <p>I've been watching you change, grow, evolve. The way you make sure I never feel alone, the little things you do to show you care... baby doll, you're amazing. You're genuinely the <strong>best thing</strong> that's ever happened to me, like genuinelyyyy. 🌟</p>
            
            <p>You're healing parts of me I didn't even know were broken. Sure, sometimes old wounds open up, but with you by my side, I know they'll close for good someday. ❤️‍🩹</p>
            
            <p>Can we talk about how gorgeous you are? That voice ufffff, those mesmerising eyes, that smile that fixes everything... And okay, your soft thighs, ehm ehm those osm b..... anyways, your cutesy little nosey, literally <strong>everything about you</strong> drives me crazy in the bestest way! 😍</p>
            
            <p>You're my <strong>SUKOON</strong> when life gets chaotic. My comfort when the world feels heavy. The only one who is trying to always understand me. <strong>MY WIFEYYYYY</strong> 🎁💖</p>
            
            <p>I see you trying so hard to grow for us, and trust me, I'm doing the same. We're both becoming better versions of ourselves, and that's what real love does, right? 🌱✨</p>
            
            <p>Four months down, and I promise you - this is turning into <strong>forever</strong>. You're going to be the Dhingra parivaar ki bahu raani, mark my words! 👰💍</p>

            <p>Youuuuuu theeeeeeeeeeeeee bestesttttttttttttttttttttttttt meriiiiiiiiii JAAAAAAAAAAAAAAANNNNNNNNNNN</P>
            
            <p style="text-align: center; margin-top: 25px; font-size: 17px; font-weight: 700; color: #ff4f8b;">
              HAPPY 4 MONTHS MERI JAAAAAAAAAAAAAAAAANNNNNNNNNn!<br>
              I LOVEEEEEE YOUUUUUU THEEEEEE MOSTTTTTTTT LAADDO RAANI!<br>
              MORE THAN WORDS CAN SAY! 💖💖💖
            </p>
            
            <p style="text-align: center; font-size: 20px; margin-top: 20px;">
              <strong>RADHEE RADHEEE 🌷</strong><br>
              <strong>AUWWWW AUWWWWW AUWWWWWWWWWW ❤️❤️💕💕❤️</strong>
            </p>
            
            <p style="text-align: center; margin-top: 25px;">
              <em>Forever yours,<br>Aarit 💕</em>
            </p>
          </div>
        </div>
      </div>
      <div class="envelope-prompt" id="envelopePrompt">
        👆 Tap to open your love letter
      </div>
    </div>
    <div class="center" id="heartBtn" style="display: none; margin-top: 20px;">
      <button onclick="releaseHearts()">Tap for Infinite Love 💖</button>
    </div>
  `;
}

let envelopeOpened = false;

function openEnvelope() {
  if (envelopeOpened) return;
  
  const envelope = document.getElementById('envelope');
  const prompt = document.getElementById('envelopePrompt');
  const heartBtn = document.getElementById('heartBtn');
  
  envelope.classList.add('open');
  prompt.style.display = 'none';
  envelopeOpened = true;
  
  setTimeout(() => {
    heartBtn.style.display = 'block';
  }, 1500);
}

let heartsReleased = false;

function releaseHearts() {
  if (heartsReleased) return;
  heartsReleased = true;
  
  const emojis = ['❤️', '💖', '💗', '💕', '💘', '🌷', '😘', '🥰', '💑', '💍', '🌹', '💝'];
  
  for (let i = 0; i < 100; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'heart';
      el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
      
      const startPos = Math.random() * 100;
      const drift = (Math.random() - 0.5) * 200;
      
      el.style.left = startPos + 'vw';
      el.style.setProperty('--drift', drift + 'px');
      el.style.fontSize = (20 + Math.random() * 35) + 'px';
      el.style.animationDuration = (5 + Math.random() * 4) + 's';
      
      document.body.appendChild(el);
      
      setTimeout(() => el.remove(), 10000);
    }, i * 100);
  }
  
  setTimeout(() => {
    heartsReleased = false;
  }, 15000);
}
</script>

</body>
</html>
