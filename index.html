<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Special Surprise</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    padding: 20px;
  }

  .card {
    background: white;
    padding: 30px;
    border-radius: 20px;
    max-width: 500px;
    width: 100%;
    box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  }

  h1 {
    color: #ff4d6d;
  }

  button {
    background: #ff4d6d;
    color: white;
    border: none;
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 18px;
    cursor: pointer;
    margin-top: 20px;
  }

  #surprise {
    display: none;
    margin-top: 25px;
    font-size: 22px;
    font-weight: bold;
    color: #333;
  }
</style>
</head>
<body>

<div class="card">
  <h1>🎁 A Special Surprise!</h1>
  <p>Tap the button below.</p>

  <button id="surpriseBtn">Open Surprise ❤️</button>

  <div id="surprise">
    Happy Birthday! 🎂🎉❤️
  </div>
</div>

<script>
  const btn = document.getElementById("surpriseBtn");
  const surprise = document.getElementById("surprise");

  btn.addEventListener("click", function () {
    surprise.style.display = "block";
    btn.style.display = "none";
  });
</script>

</body>
</html>
