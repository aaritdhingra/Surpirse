<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy 4 Months My Love 💖</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow-x: hidden;
  padding: 15px;
  position: relative;
  background: linear-gradient(135deg, #ffd1dc, #ffe6f0, #fff5f8);
}

/* Background Heart with "I said I love you first" */
.bg-heart {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 0;
  opacity: 0.08;
  pointer-events: none;
  text-align: center;
}

.bg-heart-emoji {
  font-size: 280px;
  color: #ff4f8b;
  filter: blur(2px);
}

.bg-heart-text {
  font-family: 'Great Vibes', cursive;
  font-size: 42px;
  color: #ff4f8b;
  margin-top: -40px;
  text-shadow: 0 2px 10px rgba(255, 79, 139, 0.3);
}

/* Card Container */
.card {
  width: 100%;
  max-width: 420px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(15px);
  border-radius: 30px;
  box-shadow: 0 20px 50px rgba(255, 105, 180, 0.25);
  padding: 30px 25px;
  text-align: center;
  position: relative;
  z-index: 10;
}

.title-script {
  font-family: 'Great Vibes', cursive;
  font-size: 2.8rem;
  color: #ff4f8b;
  margin-bottom: 15px;
}

h2 {
  color: #ff4f8b;
  margin-bottom: 12px;
  font-size: 1.5rem;
}

p {
  line-height: 1.8;
  color: #555;
  font-size: 15px;
}

button {
  border: none;
  background: linear-gradient(45deg, #ff4f8b, #ff77a9);
  color: #fff;
  padding: 14px 35px;
  border-radius: 50px;
  margin-top: 20px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  box-shadow: 0 8px 20px rgba(255, 79, 139, 0.35);
  transition: all 0.3s ease;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 30px rgba(255, 79, 139, 0.45);
}

button:active {
  transform: scale(0.98);
}

/* Flip Card */
.flip-card {
  perspective: 1200px;
  margin: 20px 0;
}

.flip-inner {
  position: relative;
  width: 100%;
  height: 450px;
  transform-style: preserve-3d;
  transition: transform 0.8s ease;
}

.flip-inner.flipped {
  transform: rotateY(180deg);
}

.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  border-radius: 20px;
  overflow: hidden;
  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
}

.front {
  background: #fff;
  display: flex;
  flex-direction: column;
}

.photo-container {
  width: 100%;
  height: 380px;
  background: linear-gradient(135deg, #ffd1dc, #ffb3c6);
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.photo-container img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}

/* Fallback if image doesn't load */
.photo-placeholder {
  font-size: 80px;
  color: rgba(255, 79, 139, 0.3);
}

.caption {
  padding: 15px;
  background: rgba(255, 79, 139, 0.95);
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  text-align: center;
}

.back {
  transform: rotateY(180deg);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 35px 25px;
  background: linear-gradient(135deg, #fff, #ffeaf3);
  color: #ff4f8b;
  font-weight: 600;
  line-height: 1.9;
  font-size: 16px;
  text-align: center;
}

/* Fall Animation */
.fall {
  animation: fall 1s ease-in forwards;
}

@keyframes fall {
  0% {
    transform: translateY(0) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: translateY(120vh) rotate(25deg);
    opacity: 0;
  }
}

/* Letter */
.letter {
  max-height: 70vh;
  overflow-y: auto;
  text-align: left;
  padding-right: 8px;
}

.letter::-webkit-scrollbar {
  width: 6px;
}

.letter::-webkit-scrollbar-thumb {
  background: #ff4f8b;
  border-radius: 10px;
}

.letter h1 {
  font-family: 'Great Vibes', cursive;
  text-align: center;
  font-size: 2.8rem;
  color: #ff4f8b;
  margin-bottom: 20px;
}

.letter p {
  font-size: 15px;
  line-height: 1.9;
}

.center {
  text-align: center;
}

/* Floating Hearts */
.heart {
  position: fixed;
  bottom: -50px;
  pointer-events: none;
  z-index: 9999;
  animation: floatUp linear forwards;
}

@keyframes floatUp {
  0% {
    bottom: -50px;
    opacity: 0;
    transform: translateX(0) rotate(0deg);
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    bottom: 110vh;
    opacity: 0;
    transform: translateX(var(--drift)) rotate(360deg);
  }
}

/* Responsive */
@media (max-width: 480px) {
  .title-script {
    font-size: 2.2rem;
  }
  
  h2 {
    font-size: 1.3rem;
  }
  
  .flip-inner {
    height: 400px;
  }
  
  .photo-container {
    height: 330px;
  }
  
  .bg-heart-emoji {
    font-size: 200px;
  }
  
  .bg-heart-text {
    font-size: 32px;
  }
  
  button {
    padding: 12px 30px;
    font-size: 16px;
  }
  
  .letter h1 {
    font-size: 2.2rem;
  }
}

@media (max-width: 360px) {
  .flip-inner {
    height: 360px;
  }
  
  .photo-container {
    height: 290px;
  }
}
</style>
</head>
<body>

<!-- Background Heart -->
<div class="bg-heart">
  <div class="bg-heart-emoji">❤️</div>
  <div class="bg-heart-text">I said I love you first</div>
</div>

<!-- Main Card -->
<div class="card" id="app">
  <div class="title-script">Hey Love ❤️</div>
  <h2>🔔 New Notification</h2>
  <p>You have a new notification from <strong>Aarit Dhingra</strong></p>
  <button onclick="startStory()">Read 💌</button>
</div>

<script>
const slides = [
  {
    image: 'photo1.jpg',
    caption: 'Our first photo together ❤️',
    message: 'This wasn\'t the day we started, but this moment? Pure magic. I knew something special was beginning.'
  },
  {
    image: 'photo2.jpg',
    caption: 'Caught by our friends 📸',
    message: 'Kaushi ne khichwai thi yeh... we were shy at first, but we secretly loved every second of it! 🥰'
  },
  {
    image: 'photo3.jpg',
    caption: 'Pinterest aesthetic vibes 🌸',
    message: 'Us being all aesthetic and cute! This is the kind of love that deserves to be captured forever. 💖'
  },
  {
    image: 'photo4.jpg',
    caption: 'Muuaaahh 😘💕',
    message: 'Both our faces in one frame, pure cuteness overload! This is what happiness looks like. 🥰'
  }
];

let current = 0;
let flipped = false;

function startStory() {
  renderSlide();
}

function renderSlide() {
  const s = slides[current];
  const app = document.getElementById('app');
  app.className = 'card';
  
  app.innerHTML = `
    <div class="flip-card">
      <div class="flip-inner" id="flipInner">
        <div class="face front">
          <div class="photo-container">
            <img src="${s.image}" alt="Memory" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="photo-placeholder" style="display:none;">📸</div>
          </div>
          <div class="caption">${s.caption}</div>
        </div>
        <div class="face back">
          ${s.message}
        </div>
      </div>
    </div>
    <button onclick="handleNext()" id="nextBtn">See Message ✨</button>
  `;
  
  flipped = false;
}

function handleNext() {
  const flip = document.getElementById('flipInner');
  const btn = document.getElementById('nextBtn');
  
  if (!flipped) {
    flip.classList.add('flipped');
    flipped = true;
    btn.innerHTML = 'Next Photo 💫';
    return;
  }
  
  const app = document.getElementById('app');
  app.classList.add('fall');
  
  setTimeout(() => {
    current++;
    if (current < slides.length) {
      renderSlide();
    } else {
      showLetter();
    }
  }, 1000);
}

function showLetter() {
  const app = document.getElementById('app');
  app.className = 'card';
  
  app.innerHTML = `
    <div class="letter">
      <h1>Happy 4 Months ❤️</h1>
      <p>
        Soooooooooo... 4 monthsssss doneeeeeeeeeee ❤️💗🩷💖<br><br>
        
        Yeyyyyyyyiiiiiiieeeeeee... we movingggg stronglyyyyyyy hehehehehe! 🥰<br><br>
        
        Iss month bhi problems aayi, ladaiam hui, and tbh pehle se jyada hi hui hain buttttttttt... we are closer and stronger than ever! 💪❤️<br><br>
        
        Anddddd aiseeee hi aur close aate rahenge yahi goal hai... I promiseeeee humeshaaaaa aaapkaaa rahungaaaaa! 💍<br><br>
        
        See, I have noticed ki tune bohotttt change kia hai and abb bohot dhyaan rakhti hai ki meko akela na feel ho and all... achaaaa lagta hai dekh kr sachiiiii. Tu bestesttttttttttt haiiiiiiii yrrrrr! 🌟<br><br>
        
        You are the one who is healing me. Haan, time to time wo ghao wapis khul jaate hain, but I know thode time ke baad aap aise heal krdoge sab. ❤️‍🩹<br><br>
        
        I loveeeeee your voice, I loveeee your eyes, I loveeee your body... Aapki soft soft thighs, lambe lambe haath, pyaare pyaare paer, chotu si naak, chotu si shaqal, pyaare pyaare boobies aurrrrrr baaki sab bhi uppar se neeche tak! 😘<br><br>
        
        Phirrrr aapki thinking, aapki soul... Basicallyyyy aapke baareee me sabbbbb kuchhhhhh! 🥰<br><br>
        
        Muuuuaaaaahhhhhh! Aapke lips dekh kr kissi krne ka mann kr jata. 💋<br><br>
        
        Abhi 4 months complete hue hain and we will make sure ki this turns into lifetime! 💖👰<br><br>
        
        U are the bestesttttt everrr and ik u are trying sooo harddd to grow for me, and I will also try my best ki aapke liye best banu, sabse bestestttt, sabse bada green flaggg! 🚩💚<br><br>
        
        You are my peace, my comfort, my happiness, and the best thing that has happened to me. 🌈<br><br>
        
        <strong>HAPPY 4 MONTHS</strong><br>
        <strong>LOVEEEEEEEEEEEEEEEEEEEEEEEEE YOUUUUUUUUUUUUUUUUUUUU THEEEEEEEEEEEE MOSTTTTTTTTTTTTTTTT</strong> ❤️❤️❤️
      </p>
      <br>
      <h2 class="center">RADHEE RADHEEE 🌷</h2>
      <h2 class="center">AUW AUW AUWWWWW 🐺❤️</h2>
      <div class="center">
        <button onclick="releaseHearts()">Tap for Infinite Love 💖</button>
      </div>
    </div>
  `;
}

let heartsReleased = false;

function releaseHearts() {
  if (heartsReleased) return;
  heartsReleased = true;
  
  const emojis = ['❤️', '💖', '💗', '💕', '💘', '🌷', '😘', '🥰', '💑', '💍'];
  
  for (let i = 0; i < 100; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'heart';
      el.innerHTML = emojis[Math.floor(Math.random() * emojis.length)];
      
      const startPos = Math.random() * 100;
      const drift = (Math.random() - 0.5) * 200;
      
      el.style.left = startPos + 'vw';
      el.style.setProperty('--drift', drift + 'px');
      el.style.fontSize = (20 + Math.random() * 35) + 'px';
      el.style.animationDuration = (5 + Math.random() * 4) + 's';
      
      document.body.appendChild(el);
      
      setTimeout(() => el.remove(), 10000);
    }, i * 100);
  }
  
  // Reset after 15 seconds
  setTimeout(() => {
    heartsReleased = false;
  }, 15000);
}
</script>

</body>
</html>
